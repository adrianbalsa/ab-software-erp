# Fase 4 — CI (backend + frontend), imagen Docker → GHCR, notificación webhook.
#
# Secrets opcionales:
#   CI_WEBHOOK_URL     — Slack (hooks.slack.com) o Discord (discord.com/api/webhooks/…)
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN — push adicional a Docker Hub (opcional)

name: main

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -q --tb=short
        env:
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_KEY: ci-anon-key
          SUPABASE_SERVICE_KEY: ci-service-role-key
          SUPABASE_JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars
          JWT_SECRET_KEY: ci-app-jwt-secret-at-least-32-characters
          SESSION_SECRET_KEY: ci-session-secret-at-least-32-characters-long
          ENVIRONMENT: development

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

  docker-build-push:
    needs: [backend-pytest, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: img
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/ab-logistics-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify webhook (deploy job)
        if: always()
        env:
          HOOK: ${{ secrets.CI_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -e
          if [ -z "${HOOK:-}" ]; then
            echo "CI_WEBHOOK_URL no configurado; omitiendo notificación."
            exit 0
          fi
          TEXT="AB Logistics OS — Docker build/push: ${JOB_STATUS} — ${GITHUB_REF} @ ${GITHUB_SHA:0:7}"
          if echo "$HOOK" | grep -q 'hooks.slack.com'; then
            PAYLOAD="$(jq -n --arg t "$TEXT" '{text:$t}')"
          else
            PAYLOAD="$(jq -n --arg t "$TEXT" '{content:$t}')"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$HOOK" || true

  notify-ci:
    needs: [backend-pytest, frontend-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify webhook (workflow summary)
        env:
          HOOK: ${{ secrets.CI_WEBHOOK_URL }}
          B: ${{ needs.backend-pytest.result }}
          F: ${{ needs.frontend-build.result }}
        run: |
          set -e
          if [ -z "${HOOK:-}" ]; then
            echo "CI_WEBHOOK_URL no configurado; omitiendo notificación."
            exit 0
          fi
          TEXT="AB Logistics OS CI — backend:${B} frontend:${F} — ${GITHUB_REF} @ ${GITHUB_SHA:0:7}"
          if echo "$HOOK" | grep -q 'hooks.slack.com'; then
            PAYLOAD="$(jq -n --arg t "$TEXT" '{text:$t}')"
          else
            PAYLOAD="$(jq -n --arg t "$TEXT" '{content:$t}')"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$HOOK" || true
