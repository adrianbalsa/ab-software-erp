# Fase 4 — CI/CD Enterprise: tests obligatorios (incl. Math Engine) + build + imagen API → GHCR.
#
# Secrets opcionales:
#   CI_WEBHOOK_URL     — Slack o Discord
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN — push adicional a Docker Hub (opcional)

name: deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # Falla el pipeline si cualquier test falla (suite unificada en backend/tests/).
  backend-pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (suite completa; incluye routes optimizer Truck API)
        run: pytest -k routes_optimizer tests/ -v --tb=short
        env:
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_KEY: ci-anon-key
          SUPABASE_SERVICE_KEY: ci-service-role-key
          SUPABASE_JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars
          JWT_SECRET_KEY: ci-app-jwt-secret-at-least-32-characters
          SESSION_SECRET_KEY: ci-session-secret-at-least-32-characters-long
          ENVIRONMENT: development
          # SlowAPI: sin Redis en el runner, usar almacenamiento en memoria (solo tests/CI).
          DEV_MODE: "true"
          STRIPE_WEBHOOK_SECRET: whsec_dummy_test_secret

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run test:unit
          npm run build

  security-scan:
    needs: [backend-pytest, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dependency Audit (backend - pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Dependency Audit (frontend - npm audit)
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=critical

      - name: Build backend image for Trivy
        run: docker build -t backend:latest -f backend/Dockerfile ./backend

      - name: Security Scan (Trivy image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: backend:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (Syft)
        run: |
          syft dir:. -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

  docker-build-push:
    needs: [backend-pytest, frontend-build, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        id: img
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/ab-logistics-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (GHCR, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security Scan (Trivy image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.img.outputs.name }}:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Push image to GHCR
        run: |
          docker push "${{ steps.img.outputs.name }}:latest"
          docker push "${{ steps.img.outputs.name }}:sha-${{ github.sha }}"

      - name: Notify webhook (deploy job)
        if: always()
        env:
          HOOK: ${{ secrets.CI_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -e
          if [ -z "${HOOK:-}" ]; then
            echo "CI_WEBHOOK_URL no configurado; omitiendo notificación."
            exit 0
          fi
          TEXT="AB Logistics OS — Docker build/push: ${JOB_STATUS} — ${GITHUB_REF} @ ${GITHUB_SHA:0:7}"
          if echo "$HOOK" | grep -q 'hooks.slack.com'; then
            PAYLOAD="$(jq -n --arg t "$TEXT" '{text:$t}')"
          else
            PAYLOAD="$(jq -n --arg t "$TEXT" '{content:$t}')"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$HOOK" || true

  # Gap 119 — GitOps: Terraform (Railway) cuando cambia IaC bajo infra/terraform o infra/railway.
  # Requiere RAILWAY_TOKEN y variables TF_VAR_* (ver docs/INFRASTRUCTURE.md).
  # Apply en CI solo si la variable de repositorio RAILWAY_TERRAFORM_APPLY_ENABLED=true
  # y existe backend remoto vía secret TF_BACKEND_HCL (evita estado efímero).
  railway-infrastructure:
    name: Railway IaC (Terraform)
    needs: [security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    concurrency:
      group: railway-terraform-${{ github.repository }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/terraform/**'
              - 'infra/railway/**'

      - name: Sin cambios de infraestructura
        if: steps.filter.outputs.infra != 'true'
        run: echo "Sin cambios bajo infra/terraform ni infra/railway; Terraform omitido."

      - name: Comprobar RAILWAY_TOKEN
        if: steps.filter.outputs.infra == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN no está definido en los secrets del repositorio."
            exit 1
          fi

      - name: Setup Terraform
        if: steps.filter.outputs.infra == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Escribir backend remoto (opcional)
        if: steps.filter.outputs.infra == 'true'
        env:
          TF_BACKEND_HCL: ${{ secrets.TF_BACKEND_HCL }}
        run: |
          if [ -n "${TF_BACKEND_HCL:-}" ]; then
            printf '%s\n' "$TF_BACKEND_HCL" > backend.auto.tf
          fi

      - name: Terraform Init
        if: steps.filter.outputs.infra == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: terraform init -input=false

      # Evita plan/apply con secretos vacíos: en Railway el API y el worker mueren con
      # "Missing required env var: SUPABASE_URL" y el healthcheck falla en cadena.
      - name: Comprobar TF_VAR obligatorias (Railway)
        if: steps.filter.outputs.infra == 'true'
        env:
          TF_VAR_project_name: ${{ vars.TF_VAR_project_name }}
          TF_VAR_github_repo: ${{ vars.TF_VAR_github_repo }}
          TF_VAR_official_frontend_origin_production: ${{ vars.TF_VAR_official_frontend_origin_production }}
          TF_VAR_official_frontend_origin_staging: ${{ vars.TF_VAR_official_frontend_origin_staging }}
          TF_VAR_supabase_url: ${{ secrets.TF_VAR_SUPABASE_URL }}
          TF_VAR_supabase_key: ${{ secrets.TF_VAR_SUPABASE_KEY }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_session_secret_key: ${{ secrets.TF_VAR_SESSION_SECRET_KEY }}
          TF_VAR_database_url_production: ${{ secrets.TF_VAR_DATABASE_URL_PRODUCTION }}
          TF_VAR_database_url_staging: ${{ secrets.TF_VAR_DATABASE_URL_STAGING }}
          TF_VAR_redis_url_production: ${{ secrets.TF_VAR_REDIS_URL_PRODUCTION }}
          TF_VAR_redis_url_staging: ${{ secrets.TF_VAR_REDIS_URL_STAGING }}
        run: |
          set -euo pipefail
          fail=0
          nonempty() {
            local gh_name="$1"
            local val="$2"
            if [ -z "${val:-}" ]; then
              echo "::error::${gh_name} está vacío o no definido. Sin SUPABASE_URL/KEY el backend y worker en Railway no arrancan (healthcheck / CRASHED)."
              fail=1
            fi
          }
          nonempty "Variable TF_VAR_project_name" "${TF_VAR_project_name:-}"
          nonempty "Variable TF_VAR_github_repo" "${TF_VAR_github_repo:-}"
          nonempty "Variable TF_VAR_official_frontend_origin_production" "${TF_VAR_official_frontend_origin_production:-}"
          nonempty "Variable TF_VAR_official_frontend_origin_staging" "${TF_VAR_official_frontend_origin_staging:-}"
          nonempty "Secret TF_VAR_SUPABASE_URL" "${TF_VAR_supabase_url:-}"
          nonempty "Secret TF_VAR_SUPABASE_KEY" "${TF_VAR_supabase_key:-}"
          nonempty "Secret TF_VAR_JWT_SECRET_KEY" "${TF_VAR_jwt_secret_key:-}"
          nonempty "Secret TF_VAR_SESSION_SECRET_KEY" "${TF_VAR_session_secret_key:-}"
          nonempty "Secret TF_VAR_DATABASE_URL_PRODUCTION" "${TF_VAR_database_url_production:-}"
          nonempty "Secret TF_VAR_DATABASE_URL_STAGING" "${TF_VAR_database_url_staging:-}"
          nonempty "Secret TF_VAR_REDIS_URL_PRODUCTION" "${TF_VAR_redis_url_production:-}"
          nonempty "Secret TF_VAR_REDIS_URL_STAGING" "${TF_VAR_redis_url_staging:-}"
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: Terraform Plan o Apply
        if: steps.filter.outputs.infra == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          TF_VAR_project_name: ${{ vars.TF_VAR_project_name }}
          TF_VAR_github_repo: ${{ vars.TF_VAR_github_repo }}
          TF_VAR_official_frontend_origin_production: ${{ vars.TF_VAR_official_frontend_origin_production }}
          TF_VAR_official_frontend_origin_staging: ${{ vars.TF_VAR_official_frontend_origin_staging }}
          TF_VAR_supabase_url: ${{ secrets.TF_VAR_SUPABASE_URL }}
          TF_VAR_supabase_key: ${{ secrets.TF_VAR_SUPABASE_KEY }}
          TF_VAR_supabase_service_key: ${{ secrets.TF_VAR_SUPABASE_SERVICE_KEY }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_session_secret_key: ${{ secrets.TF_VAR_SESSION_SECRET_KEY }}
          TF_VAR_maps_api_key: ${{ secrets.TF_VAR_MAPS_API_KEY }}
          TF_VAR_database_url_production: ${{ secrets.TF_VAR_DATABASE_URL_PRODUCTION }}
          TF_VAR_database_url_staging: ${{ secrets.TF_VAR_DATABASE_URL_STAGING }}
          TF_VAR_redis_url_production: ${{ secrets.TF_VAR_REDIS_URL_PRODUCTION }}
          TF_VAR_redis_url_staging: ${{ secrets.TF_VAR_REDIS_URL_STAGING }}
        run: |
          set -euo pipefail
          APPLY_ENABLED='${{ vars.RAILWAY_TERRAFORM_APPLY_ENABLED }}'
          if [ "$APPLY_ENABLED" = "true" ]; then
            if [ ! -f backend.auto.tf ]; then
              echo "::error::RAILWAY_TERRAFORM_APPLY_ENABLED=true pero falta el secret TF_BACKEND_HCL (backend remoto). Sin estado persistente no se debe aplicar desde CI."
              exit 1
            fi
            terraform apply -auto-approve -input=false -no-color
          else
            echo "RAILWAY_TERRAFORM_APPLY_ENABLED distinto de true: ejecutando solo terraform plan."
            terraform plan -input=false -no-color
          fi

  notify-ci:
    needs: [backend-pytest, frontend-build, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify webhook (workflow summary)
        env:
          HOOK: ${{ secrets.CI_WEBHOOK_URL }}
          B: ${{ needs.backend-pytest.result }}
          F: ${{ needs.frontend-build.result }}
          S: ${{ needs.security-scan.result }}
        run: |
          set -e
          if [ -z "${HOOK:-}" ]; then
            echo "CI_WEBHOOK_URL no configurado; omitiendo notificación."
            exit 0
          fi
          TEXT="AB Logistics OS CI — backend:${B} frontend:${F} security:${S} — ${GITHUB_REF} @ ${GITHUB_SHA:0:7}"
          if echo "$HOOK" | grep -q 'hooks.slack.com'; then
            PAYLOAD="$(jq -n --arg t "$TEXT" '{text:$t}')"
          else
            PAYLOAD="$(jq -n --arg t "$TEXT" '{content:$t}')"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$HOOK" || true
