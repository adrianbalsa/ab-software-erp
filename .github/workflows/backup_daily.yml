name: Backup Daily

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup-db:
    name: Supabase backup and secure upload
    runs-on: ubuntu-latest
    env:
      BACKUP_DIR: ./backups
      BACKUP_AWS_REGION: ${{ secrets.BACKUP_AWS_REGION }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "${SUPABASE_ACCESS_TOKEN}" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "${SUPABASE_PROJECT_REF}" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)
          test -n "${SUPABASE_DB_PASSWORD}" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          test -n "${BACKUP_AWS_REGION}" || (echo "Missing BACKUP_AWS_REGION" && exit 1)
          case "${BACKUP_AWS_REGION}" in
            eu-*) ;;
            *) echo "BACKUP_AWS_REGION must be an AWS Europe region (eu-*), got ${BACKUP_AWS_REGION}" && exit 1 ;;
          esac

      - name: Generate backup archive
        run: |
          chmod +x ./scripts/backup_db.sh
          ./scripts/backup_db.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.BACKUP_AWS_REGION }}

      - name: Upload backup to secure external storage (S3)
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
          BACKUP_S3_KMS_KEY_ID: ${{ secrets.BACKUP_S3_KMS_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "${BACKUP_S3_BUCKET}" || (echo "Missing BACKUP_S3_BUCKET" && exit 1)
          PREFIX="${BACKUP_S3_PREFIX:-ab-logistics/daily}"
          LATEST_BACKUP="$(ls -1t ${BACKUP_DIR}/supabase_backup_*.tar.gz | head -n 1)"
          BACKUP_KEY="${PREFIX}/$(basename "${LATEST_BACKUP}")"
          BACKUP_URI="s3://${BACKUP_S3_BUCKET}/${BACKUP_KEY}"

          bucket_region="$(aws s3api get-bucket-location --bucket "${BACKUP_S3_BUCKET}" --query 'LocationConstraint' --output text)"
          if [[ "${bucket_region}" == "EU" ]]; then
            bucket_region="eu-west-1"
          fi
          case "${bucket_region}" in
            eu-*) ;;
            *) echo "Backup bucket must be in an AWS Europe region (eu-*), got ${bucket_region}" && exit 1 ;;
          esac
          if [[ "${bucket_region}" != "${BACKUP_AWS_REGION}" ]]; then
            echo "Backup bucket region (${bucket_region}) must match BACKUP_AWS_REGION (${BACKUP_AWS_REGION})"
            exit 1
          fi

          sse_args=(--sse AES256)
          if [[ -n "${BACKUP_S3_KMS_KEY_ID:-}" ]]; then
            sse_args=(--sse aws:kms --sse-kms-key-id "${BACKUP_S3_KMS_KEY_ID}")
          fi

          aws s3 cp "${LATEST_BACKUP}" "${BACKUP_URI}" "${sse_args[@]}"

          object_sse="$(aws s3api head-object --bucket "${BACKUP_S3_BUCKET}" --key "${BACKUP_KEY}" --query 'ServerSideEncryption' --output text)"
          case "${object_sse}" in
            AES256|aws:kms) echo "Uploaded encrypted backup (${object_sse}) to ${BACKUP_URI}" ;;
            *) echo "Backup object is missing server-side encryption: ${object_sse}" && exit 1 ;;
          esac

      - name: Validate bucket security (PAB, default encryption, lifecycle 35d)
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/validate_backup_s3_bucket.sh
          ./scripts/validate_backup_s3_bucket.sh

      - name: Upload backup artifact (short retention)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup
          path: backups/supabase_backup_*.tar.gz
          retention-days: 2
