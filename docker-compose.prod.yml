# AB Logistics OS — producción (VPS + Docker Compose + Cloudflare Tunnel opcional)
#
# Redes:
#   internal — solo redis ↔ backend (aislada; sin salida a Internet salvo lo que haga el backend)
#   app      — frontend, backend, caddy
#   edge     — caddy ↔ cloudflared (sin acceso a redis)
#
# Variables obligatorias en .env (raíz del repo):
#   APP_DOMAIN, API_DOMAIN — mismos FQDN que en Cloudflare (Host header)
# Opcional túnel:
#   CLOUDFLARE_TUNNEL_TOKEN — si está definido, activar perfil cloudflare (ver deploy.sh)
#
# Build:
#   docker compose -f docker-compose.prod.yml build

services:
  redis:
    image: redis:7-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes
    mem_limit: 256m
    mem_reservation: 64m
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: abl-backend:prod
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1536m
    mem_reservation: 512m
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H 'Host: ${API_DOMAIN}' http://127.0.0.1:8000/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tu-dominio.com}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_MAPS_API_KEY: ${NEXT_PUBLIC_MAPS_API_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: abl-frontend:prod
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 1024m
    mem_reservation: 256m
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 35s

  caddy:
    image: caddy:2-alpine
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 128m
    mem_reservation: 32m
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Definir APP_DOMAIN en .env (FQDN del frontend)}
      API_DOMAIN: ${API_DOMAIN:?Definir API_DOMAIN en .env (FQDN de la API)}
    volumes:
      - ./infra/caddy/Caddyfile.docker:/etc/caddy/Caddyfile:ro
    ports:
      # Acceso local en el VPS (Nginx host, diagnóstico, túnel manual). No exponer a 0.0.0.0 sin firewall.
      - "${CADDY_BIND:-127.0.0.1}:${CADDY_HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app
      - edge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --header=\"Host: $$API_DOMAIN\" http://127.0.0.1:80/ready || exit 1",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    mem_reservation: 64m
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - edge
    depends_on:
      caddy:
        condition: service_healthy
    profiles:
      - cloudflare

  sentinel-watchdog:
    image: abl-backend:prod
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m
    mem_reservation: 64m
    env_file:
      - .env
      - ./backend/.env
    command:
      [
        "/bin/sh",
        "-c",
        "while true; do python scripts/sentinel_watchdog.py; sleep 900; done",
      ]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app

networks:
  internal:
    internal: true
  app:
    driver: bridge
  edge:
    driver: bridge
