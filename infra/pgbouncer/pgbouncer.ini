; PgBouncer — AB Logistics OS (transaction pooling para FastAPI / SQLAlchemy)
; Montar en el contenedor: /etc/pgbouncer/pgbouncer.ini

[databases]
; El nombre de base que use el cliente debe existir en Postgres (p. ej. ablogistics).
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
reserve_pool_size = 5

ignore_startup_parameters = extra_float_digits

; Recomendado con pool_mode = transaction (libera estado de sesión al devolver al pool)
server_reset_query = DISCARD ALL

; Consola admin (opcional; usuario debe existir en userlist.txt)
admin_users = postgres

log_connections = 1
log_disconnections = 1

pidfile = /tmp/pgbouncer.pid
logfile = /tmp/pgbouncer.log
