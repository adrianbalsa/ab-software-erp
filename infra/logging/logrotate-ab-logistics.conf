# Ejemplo: copiar a /etc/logrotate.d/ab-logistics y ajustar rutas.
# Útil si usas FileHandler plano o redirección de uvicorn a fichero en lugar de
# RotatingFileHandler integrado (LOG_FILE_PATH en el API).

/var/log/ab-logistics/access.log
/var/log/ab-logistics/app.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    maxsize 50M
}
