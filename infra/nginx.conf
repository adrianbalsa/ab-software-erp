# AB Logistics OS — Nginx inverse proxy con SSL (LetsEncrypt) + cabeceras de seguridad
#
# Requiere:
# - Certificados en /etc/letsencrypt/live/api.tu-dominio.com/ y /etc/letsencrypt/live/app.tu-dominio.com/
# - Directorio de challenge /var/www/certbot
# - (Paso previo) certbot --nginx -d api.tu-dominio.com -d app.tu-dominio.com
#
# Importante: Ajusta dominios en los server_name y rutas de certificados si cambias tus FQDN.

server {
  listen 80;
  server_name api.tu-dominio.com app.tu-dominio.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# -------------------------
# API: api.tu-dominio.com
# -------------------------
server {
  listen 443 ssl http2;
  server_name api.tu-dominio.com;

  ssl_certificate     /etc/letsencrypt/live/api.tu-dominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.tu-dominio.com/privkey.pem;

  # SSL hardening mínimo
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Seguridad (cabeceras)
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  # CSP estricta (puede requerir ajustes si introduces nuevas integraciones externas)
  add_header Content-Security-Policy "
    default-src 'self';
    base-uri 'self';
    object-src 'none';
    frame-ancestors 'none';
    script-src 'self' https://maps.googleapis.com https://maps.gstatic.com https://www.google.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https://maps.gstatic.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://maps.googleapis.com https://api.tu-dominio.com;
    worker-src 'self' https://unpkg.com blob:;
    upgrade-insecure-requests
  " always;

  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_http_version 1.1;
    proxy_buffering off;
  }
}

# ----------------------------
# Frontend: app.tu-dominio.com
# ----------------------------
server {
  listen 443 ssl http2;
  server_name app.tu-dominio.com;

  ssl_certificate     /etc/letsencrypt/live/app.tu-dominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.tu-dominio.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  add_header Content-Security-Policy "
    default-src 'self';
    base-uri 'self';
    object-src 'none';
    frame-ancestors 'none';
    script-src 'self' https://maps.googleapis.com https://maps.gstatic.com https://www.google.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: https://maps.gstatic.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://maps.googleapis.com https://api.tu-dominio.com;
    worker-src 'self' https://unpkg.com blob:;
    upgrade-insecure-requests
  " always;

  client_max_body_size 25m;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_http_version 1.1;
    proxy_buffering off;
  }
}

