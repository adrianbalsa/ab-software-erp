# AB Logistics OS — HTTP reverse proxy (Docker Compose local / CI)
#
# - Puerto 80 sin TLS (no requiere certificados).
# - /api/* → FastAPI (backend:8000).
# - El resto → Next.js (frontend:3000).
#
# Nota: el SPA usa rutas de API fuera de /api (p. ej. /auth, /portes). Esas
# siguen yendo al backend vía NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
# (puerto publicado). Este proxy cumple el enrutado /api y la entrada única al front.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream backend_upstream {
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream frontend_upstream {
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 50m;

        location ^~ /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 15s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 15s;
            proxy_read_timeout 75s;
        }
    }
}
