# AB Logistics OS — Nginx (doble dominio + API dedicada)
#
# - Landing (clara): ablogistics-os.com, www → contenedor landing (sin tema oscuro en la app).
# - App: app.ablogistics-os.com → Next (web). /api/v1/ se proxifica al backend.
# - API: api.ablogistics-os.com → FastAPI completo (recomendado para evitar colisión de rutas
#   con Next: /portes, /flota, /auth, etc.). NEXT_PUBLIC_API_BASE_URL debe ser https://api...
#
# Cabeceras X-Forwarded-* para Uvicorn/FastAPI (--proxy-headers).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api_upstream {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream web_upstream {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream landing_upstream {
        server landing:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ─── HTTP → HTTPS (por server_name) ─────────────────────────────────
    server {
        listen 80;
        server_name ablogistics-os.com www.ablogistics-os.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name app.ablogistics-os.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name api.ablogistics-os.com;
        return 301 https://$host$request_uri;
    }

    # ─── 1) Landing (siempre tema claro en la SPA landing) ──────────────
    server {
        listen 443 ssl http2;
        server_name ablogistics-os.com www.ablogistics-os.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://landing_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 75s;
        }
    }

    # ─── 2) API dedicada (recomendada: mismo esquema HTTPS, sin mezclar con rutas Next) ─
    server {
        listen 443 ssl http2;
        server_name api.ablogistics-os.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout invalid_header http_502 http_504;
            proxy_next_upstream_tries 2;
        }
    }

    # ─── 3) App (Next) + alias /api/v1 hacia FastAPI ─────────────────────
    server {
        listen 443 ssl http2;
        server_name app.ablogistics-os.com;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Versión explícita (preferida por el front si API_BASE es origin app + path)
        location ^~ /api/v1/ {
            proxy_pass http://api_upstream/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout invalid_header http_502 http_504;
            proxy_next_upstream_tries 2;
        }

        # Atajo /api/foo → /api/v1/foo (evitar doble /api/v1/v1 si ya usas location anterior)
        location /api/ {
            rewrite ^/api/(.*)$ /api/v1/$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        location ~ ^/(docs|redoc)$ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /openapi.json {
            proxy_pass http://api_upstream/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Fuerza https para evitar "Mixed Content" en el backend.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout 75s;
        }
    }
}
